name: Frontend & API Tests

on:
  pull_request:
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-playwright boto3 duckdb pyarrow
        python -m playwright install --with-deps chromium

    - name: Download web parquet from R2
      env:
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      run: |
        python3 -c "
        import boto3, os
        s3 = boto3.client('s3',
            endpoint_url=os.environ['R2_ENDPOINT_URL'],
            aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
            aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
        )
        os.makedirs('web/data', exist_ok=True)
        print('Downloading web/jobs_5yr.parquet ...')
        s3.download_file('usajobs-data', 'web/jobs_5yr.parquet', 'web/data/jobs_5yr.parquet')
        size = os.path.getsize('web/data/jobs_5yr.parquet')
        print(f'Downloaded {size / 1024 / 1024:.1f} MB')
        print('Downloading web/static.json ...')
        s3.download_file('usajobs-data', 'web/static.json', 'web/data/static.json')
        size = os.path.getsize('web/data/static.json')
        print(f'Downloaded {size / 1024:.1f} KB')
        "

    - name: Start test server
      run: |
        cd web && python test_server.py &
        # Wait for server to be ready
        for i in $(seq 1 30); do
          if curl -s http://localhost:3333 > /dev/null 2>&1; then
            echo "Server is ready"
            break
          fi
          echo "Waiting for server... ($i)"
          sleep 1
        done
        # Final check
        curl -sf http://localhost:3333 > /dev/null || (echo "Server failed to start" && exit 1)

    - name: Run API tests
      run: |
        python -m pytest web/tests/test_api.py -v

    - name: Run frontend E2E tests
      run: |
        python -m pytest web/tests/test_frontend.py -v --screenshot=on --output=test-results

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
        retention-days: 7
